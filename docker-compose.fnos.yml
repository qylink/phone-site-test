# Fnos deployment compose - with image pre-pull fallback
services:
  phone-site:
    build:
      context: .
      dockerfile: Dockerfile
    image: phone-site:latest
    container_name: phone-site
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - phone-net

networks:
  phone-net:
    driver: bridge